name: Benchmark

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install zstd
        run: sudo apt-get install -y zstd

      - name: Build release
        run: cargo build --release

      - name: Run benchmarks
        run: |
          chmod +x bench/run.sh
          bash bench/run.sh > bench/results.csv

      - name: Generate plots
        run: |
          pip install matplotlib
          python3 bench/plot.py bench/results.csv bench/

      - name: Commit benchmark results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bench/results.csv bench/*.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "bench: update benchmark results and plots"
            git push
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const csv = fs.readFileSync('bench/results.csv', 'utf8');
            const lines = csv.trim().split('\n').slice(1);

            let table = '| Dataset | Tool | Operation | Time | Size | Ratio |\n';
            table += '|---------|------|-----------|------|------|-------|\n';
            for (const line of lines) {
              const [tool, dataset, op, time, input, output, ratio] = line.split(',');
              const sizeStr = output ? `${output} MB` : '-';
              const ratioStr = ratio ? `${ratio}x` : '-';
              table += `| ${dataset} | ${tool} | ${op} | ${time}ms | ${sizeStr} | ${ratioStr} |\n`;
            }

            const body = `## Benchmark Results\n\n${table}\n\n` +
              `![Speed](bench/bench-speed.svg)\n![Size](bench/bench-size.svg)\n\n` +
              `*Generated by CI on \`${process.env.GITHUB_SHA?.slice(0, 7)}\`*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Benchmark Results')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
